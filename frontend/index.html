<!DOCTYPE html>
<html>
<head>
  <title>Evidence Management System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    header {
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.3px;
      color: #1a1a1a;
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .wallet-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 0.5px solid #e0e0dc;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 2rem;
    }

    #account {
      font-size: 13px;
      color: #888;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #account.connected {
      color: #1a7a4a;
      font-weight: 500;
    }

    .card {
      background: #fff;
      border: 0.5px solid #e0e0dc;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #323232;
      margin-bottom: 1rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    input[type="text"],
    input[type="number"] {
      flex: 1;
      height: 40px;
      border: 0.5px solid #e0e0dc;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafaf8;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus {
      border-color: #bbb;
      background: #fff;
    }

    input::placeholder {
      color: #bbb;
    }

    button {
      height: 40px;
      padding: 0 18px;
      border: 0.5px solid #d0d0cc;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      color: #1a1a1a;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    button:hover {
      background: #f5f5f3;
      border-color: #bbb;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    .btn-primary:hover {
      background: #333;
      border-color: #333;
    }

    .result-box {
      margin-top: 12px;
      font-size: 13px;
      color: #555;
      padding: 10px 12px;
      background: #fafaf8;
      border-radius: 8px;
      border: 0.5px solid #e0e0dc;
      word-break: break-all;
      display: none;
      line-height: 1.5;
    }

    .result-box.visible { display: block; }

    .result-box.error {
      color: #c0392b;
      background: #fef6f6;
      border-color: #f5c6c6;
    }

    .result-box.success {
      color: #1a7a4a;
      background: #f2faf6;
      border-color: #b6e2cc;
    }

    .result-box.pending {
      color: #888;
      background: #fafaf8;
      border-color: #e0e0dc;
    }
  </style>
</head>

<body>
<div class="container">

  <header>
    <h1>Evidence Management</h1>
    <p>Blockchain-backed chain of custody</p>
  </header>

  <div class="wallet-bar">
    <p id="account">No wallet connected</p>
    <button class="btn-primary" onclick="connectWallet()">Connect</button>
  </div>

  <div class="card">
    <h2>Create Evidence</h2>
    <div class="input-row">
      <input type="text" id="evidenceInput" placeholder="Evidence name or metadata hash">
      <button onclick="createEvidence()">Submit</button>
    </div>
    <div id="createResult" class="result-box"></div>
  </div>

  <div class="card">
    <h2>Read Evidence</h2>
    <div class="input-row">
      <input type="number" id="readId" placeholder="Evidence ID">
      <button onclick="readEvidence()">Fetch</button>
    </div>
    <div id="readResult" class="result-box"></div>
  </div>

  <div class="card">
    <h2>Get Owner</h2>
    <div class="input-row">
      <input type="number" id="ownerIdInput" placeholder="Evidence ID">
      <button onclick="getOwner()">Lookup</button>
    </div>
    <div id="ownerResult" class="result-box"></div>
  </div>

  <div class="card">
    <h2>Grant Access</h2>
    <div class="input-stack">
      <input type="number" id="grantIdInput" placeholder="Evidence ID">
      <div class="input-row">
        <input type="text" id="grantAddressInput" placeholder="Authorized address (0x...)">
        <button onclick="grantAccess()">Grant</button>
      </div>
    </div>
    <div id="grantResult" class="result-box"></div>
  </div>

  <div class="card">
    <h2>Request Access</h2>
    <div class="input-row">
      <input type="number" id="requestIdInput" placeholder="Evidence ID">
      <button onclick="requestAccess()">Request</button>
    </div>
    <div id="requestResult" class="result-box"></div>
  </div>

  <div class="card">
    <h2>Transfer Custody</h2>
    <div class="input-stack">
      <input type="number" id="transferIdInput" placeholder="Evidence ID">
      <div class="input-row">
        <input type="text" id="transferAddressInput" placeholder="New custodian address (0x...)">
        <button onclick="transferEvidence()">Transfer</button>
      </div>
    </div>
    <div id="transferResult" class="result-box"></div>
  </div>

</div>

<script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>

let contract;

const contractAddress = "0xaE036c65C649172b43ef7156b009c6221B596B8b";

const abi = [
  {
    "inputs": [{ "internalType": "string", "name": "_metadataHash", "type": "string" }],
    "name": "create",
    "outputs": [{ "internalType": "uint256", "name": "", "type": "uint256" }],
    "stateMutability": "nonpayable",
    "type": "function"
  },
  {
    "inputs": [{ "internalType": "uint256", "name": "id", "type": "uint256" }],
    "name": "read",
    "outputs": [{ "internalType": "string", "name": "", "type": "string" }],
    "stateMutability": "view",
    "type": "function"
  },
  {
    "inputs": [
      { "internalType": "uint256", "name": "id", "type": "uint256" },
      { "internalType": "address", "name": "authorizedUser", "type": "address" }
    ],
    "name": "grantAccess",
    "outputs": [],
    "stateMutability": "nonpayable",
    "type": "function"
  },
  {
    "inputs": [{ "internalType": "uint256", "name": "id", "type": "uint256" }],
    "name": "requestAccess",
    "outputs": [],
    "stateMutability": "nonpayable",
    "type": "function"
  },
  {
    "inputs": [
      { "internalType": "uint256", "name": "id", "type": "uint256" },
      { "internalType": "address", "name": "newCustodian", "type": "address" }
    ],
    "name": "transfer",
    "outputs": [],
    "stateMutability": "nonpayable",
    "type": "function"
  },
  {
    "inputs": [{ "internalType": "uint256", "name": "id", "type": "uint256" }],
    "name": "getOwner",
    "outputs": [{ "internalType": "address", "name": "", "type": "address" }],
    "stateMutability": "view",
    "type": "function"
  }
];

function showResult(id, message, type) {
  const el = document.getElementById(id);
  el.innerText = message;
  el.className = "result-box visible " + (type || "");
}

async function connectWallet() {
  try {
    if (!window.ethereum) { alert("MetaMask not detected"); return; }
    await window.ethereum.request({ method: "eth_requestAccounts" });
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const signer = provider.getSigner();
    contract = new ethers.Contract(contractAddress, abi, signer);
    const address = await signer.getAddress();
    const el = document.getElementById("account");
    el.innerText = address.slice(0, 6) + "..." + address.slice(-4);
    el.classList.add("connected");
  } catch (error) {
    console.error(error);
    alert("Error: " + error.message);
  }
}

async function createEvidence() {
  if (!contract) { alert("Please connect MetaMask first"); return; }
  try {
    const text = document.getElementById("evidenceInput").value;
    showResult("createResult", "Submitting transaction...", "pending");
    const tx = await contract.create(text);
    await tx.wait();
    showResult("createResult", "Evidence created. Tx: " + tx.hash, "success");
  } catch (error) {
    console.error(error);
    showResult("createResult", "Failed: " + (error.reason || error.message), "error");
  }
}

async function readEvidence() {
  if (!contract) { alert("Please connect MetaMask first"); return; }
  try {
    const id = document.getElementById("readId").value;
    const result = await contract.read(id);
    showResult("readResult", result, "");
  } catch (err) {
    console.error(err);
    showResult("readResult", "Access denied or invalid ID", "error");
  }
}

async function getOwner() {
  if (!contract) { alert("Please connect MetaMask first"); return; }
  try {
    const id = document.getElementById("ownerIdInput").value;
    const owner = await contract.getOwner(id);
    showResult("ownerResult", "Owner: " + owner, "");
  } catch (err) {
    console.error(err);
    showResult("ownerResult", "Could not retrieve owner: " + (err.reason || err.message), "error");
  }
}

async function grantAccess() {
  if (!contract) { alert("Please connect MetaMask first"); return; }
  try {
    const id = document.getElementById("grantIdInput").value;
    const addr = document.getElementById("grantAddressInput").value;
    showResult("grantResult", "Submitting transaction...", "pending");
    const tx = await contract.grantAccess(id, addr);
    await tx.wait();
    showResult("grantResult", "Access granted. Tx: " + tx.hash, "success");
  } catch (error) {
    console.error(error);
    showResult("grantResult", "Failed: " + (error.reason || error.message), "error");
  }
}

async function requestAccess() {
  if (!contract) { alert("Please connect MetaMask first"); return; }
  try {
    const id = document.getElementById("requestIdInput").value;
    showResult("requestResult", "Submitting request...", "pending");
    const tx = await contract.requestAccess(id);
    await tx.wait();
    showResult("requestResult", "Access requested. Tx: " + tx.hash, "success");
  } catch (error) {
    console.error(error);
    showResult("requestResult", "Failed: " + (error.reason || error.message), "error");
  }
}

async function transferEvidence() {
  if (!contract) { alert("Please connect MetaMask first"); return; }
  try {
    const id = document.getElementById("transferIdInput").value;
    const addr = document.getElementById("transferAddressInput").value;
    showResult("transferResult", "Submitting transfer...", "pending");
    const tx = await contract.transfer(id, addr);
    await tx.wait();
    showResult("transferResult", "Custody transferred. Tx: " + tx.hash, "success");
  } catch (error) {
    console.error(error);
    showResult("transferResult", "Failed: " + (error.reason || error.message), "error");
  }
}

</script>

</body>
</html>
